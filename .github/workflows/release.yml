name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: scripts/release/build.sh --version "${GITHUB_REF_NAME#v}" --out-dir dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
